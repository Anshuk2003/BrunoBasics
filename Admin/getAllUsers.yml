info:
  name: getAllUsers
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseURL}}/admin/all-users"
  auth:
    type: basic
    username: Anshuk
    password: Abhay

runtime:
  scripts:
    - type: after-response
      code: |-
        const response = res.getBody();

        const rowData = response.map(user => ({
            username: user.username,
            roles: user.roles.join(", "),
            journals: user.journalEntries.length,
            createdDate: user.id.date
        }));

        const columnDefinitions = [
            { field: "username", filter: true, floatingFilter: true },
            { field: "roles", filter: true, floatingFilter: true },
            { field: "journals", filter: true, floatingFilter: true },
            { field: "createdDate", filter: true, floatingFilter: true }
        ];

        bru.visualize('table', {
          name: 'tableUsers',
          provider: 'ag-grid',
          props: {
            columnDefinitions,
            rowData
          }
        });
    - type: tests
      code: |-
        test("200 status code", function () {
          expect(res.getStatus()).to.eql(200);
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
